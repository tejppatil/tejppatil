name: Update profile art

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-art:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          pip install -r scripts/requirements.txt

      - name: Fetch contributions
        env:
          GH_PROFILE_USER: tejppatil
        run: |
          python scripts/fetch_contributions.py

      - name: Render heatmap
        run: |
          python scripts/render_heatmap_svg.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/contributions.json contrib-heatmap.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update contribution graph" && git push)
